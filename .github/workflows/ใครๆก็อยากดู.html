<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คลิปเลียวิเรแต่งงาน</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f9e8f4 0%, #f0d6e6 40%, #e8c3d9 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #4a274f;
      padding: 20px;
      text-align: center;
    }
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .heart {
      position: absolute;
      color: rgba(255, 100, 180, 0.6);
      font-size: 1em;
      opacity: 0.6;
      animation: float 4s ease-in-out infinite;
    }
    h2 {
      font-size: 2.4rem;
      margin-bottom: 20px;
      color: #8b5e9f;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.7);
      animation: fadeIn 1.2s ease-out;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      color: #7a4b7c;
      max-width: 500px;
      line-height: 1.6;
    }
    button {
      padding: 16px 45px;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(45deg, #ff6b9d, #ff8ec8);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
      transition: all 0.3s ease;
      animation: pulse 2s infinite;
      position: relative;
      overflow: hidden;
    }
    button:before {
      content: '❤️';
      margin-right: 8px;
      position: relative;
      top: 1px;
    }
    button:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(255, 107, 157, 0.6);
      background: linear-gradient(45deg, #ff8ec8, #ffb1d6);
    }
    button:active {
      transform: translateY(-2px);
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes pulse {
      0% {
        box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
      }
      50% {
        box-shadow: 0 8px 25px rgba(255, 107, 157, 0.6);
      }
      100% {
        box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
      }
    }
    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-15px) rotate(10deg);
      }
      100% {
        transform: translateY(0) rotate(0deg);
      }
    }
    @media (max-width: 480px) {
      h2 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
      button {
        padding: 14px 35px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- หัวใจลอยๆ ฟิวคู่รัก -->
  <div class="hearts"></div>

  <h2>✨ คลิปงานแต่งเลียวิเร ✨</h2>
  <p>อยากย้อนดูโมเมนต์หวานๆ ของทั้งคู่ หรือแนะนำให้เพื่อนๆ ได้ฟินไปพร้อมกันก็จิ้มปุ่มด้านล่างเลยนะ</p>

  <button
    onclick="window.open('https://youtu.be/dQw4w9WgXcQ?si=G7Q2RaddqXs3YhFT', '_blank', 'noopener,noreferrer')"
    aria-label="เปิดคลิปงานแต่งงานเลียวิเรในแท็บใหม่"
  >
    เปิดคลิปเลย ฟินแน่นอน 💖
  </button>

  <script>
    const hearts = document.querySelector('.hearts');
    const symbols = ['❤️', '💕', '💖', '💘', '💓'];
    for (let i = 0; i < 15; i++) {
      const heart = document.createElement('span');
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      heart.classList.add('heart');
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.top = `${Math.random() * 100}%`;
      heart.style.animationDelay = `${Math.random() * 3}s`;
      heart.style.fontSize = `${Math.random() * 1.5 + 0.8}em`;
      hearts.appendChild(heart);
    }
  </script>
</body>
</html>
